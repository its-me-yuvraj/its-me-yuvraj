name: Update LOC Stats

on:
  push:
    branches: 
      - UAT_FIXES_NEW
      - Sub_master
  schedule:
    - cron: '0 0 * * *'

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Calculate LOC across all repos
        env:
          GH_PAT: ${{ secrets.GH_TOKEN }}
          USERNAME: itsmeyuvraj
          ORG_NAME: App-Teams
        run: |
          TOTAL_ADDED=0
          TOTAL_REMOVED=0

          PERSONAL_REPOS=$(curl -s -H "Authorization: token $GH_PAT" \
            "https://api.github.com/user/repos?per_page=100&type=owner&affiliation=owner" \
            | grep '"clone_url"' | awk -F'"' '{print $4}')

          ORG_REPOS=$(curl -s -H "Authorization: token $GH_PAT" \
            "https://api.github.com/orgs/$ORG_NAME/repos?per_page=100&type=all" \
            | grep '"clone_url"' | awk -F'"' '{print $4}')

          ALL_REPOS="$PERSONAL_REPOS $ORG_REPOS"

          for REPO_URL in $ALL_REPOS; do

             # Only process these two org repos, skip everything else
            if [[ "$REPO_URL" == *"VendorBill_Web_App"* ]]; then
              BRANCH="UAT_FIXES_NEW"
            elif [[ "$REPO_URL" == *"Rental_Application"* ]]; then
              BRANCH="Sub_master"
            else
              continue
            fi
            
            echo "Processing $REPO_URL"
            AUTH_URL=$(echo "$REPO_URL" | sed "s|https://|https://$GH_PAT@|")
            git clone --quiet --branch "$BRANCH" "$AUTH_URL" temp_repo 2>/dev/null || continue

            cd temp_repo

            ADDED=$(git log \
              --author="itsmeyuvraj" \
              --author="YUVRAJ N JADHAV" \
              --author="yuvraj2675" \
              --author="Yuvraj" \
              --pretty=tformat: --numstat 2>/dev/null \
              | awk '{add += $1} END {print add+0}')

            REMOVED=$(git log \
              --author="itsmeyuvraj" \
              --author="YUVRAJ N JADHAV" \
              --author="yuvraj2675" \
              --author="Yuvraj" \
              --pretty=tformat: --numstat 2>/dev/null \
              | awk '{rem += $2} END {print rem+0}')

            TOTAL_ADDED=$((TOTAL_ADDED + ADDED))
            TOTAL_REMOVED=$((TOTAL_REMOVED + REMOVED))

            cd ..
            rm -rf temp_repo
          done

          NET=$((TOTAL_ADDED - TOTAL_REMOVED))
          DATE=$(date +"%d %b %Y")

          echo "TOTAL_ADDED=$TOTAL_ADDED" >> $GITHUB_ENV
          echo "TOTAL_REMOVED=$TOTAL_REMOVED" >> $GITHUB_ENV
          echo "NET=$NET" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV

      - name: Generate SVG
        run: |
          cat > stats.svg << EOF
          <svg width="480" height="200" viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg">
            <rect width="480" height="200" rx="12" fill="#0d1117"/>
            <rect x="1" y="1" width="478" height="198" rx="11" fill="none" stroke="#30363d"/>
            <text x="28" y="44" font-family="monospace" font-size="18" font-weight="700" fill="#e6edf3">itsmeyuvraj</text>
            <text x="28" y="64" font-family="monospace" font-size="11" fill="#8b949e">all repos · ${{ env.DATE }}</text>
            <line x1="28" y1="80" x2="452" y2="80" stroke="#21262d"/>
            <text x="28" y="110" font-family="monospace" font-size="11" fill="#8b949e" letter-spacing="1">LINES ADDED</text>
            <text x="452" y="110" font-family="monospace" font-size="20" font-weight="700" fill="#3fb950" text-anchor="end">+${{ env.TOTAL_ADDED }}</text>
            <text x="28" y="145" font-family="monospace" font-size="11" fill="#8b949e" letter-spacing="1">LINES REMOVED</text>
            <text x="452" y="145" font-family="monospace" font-size="20" font-weight="700" fill="#f85149" text-anchor="end">-${{ env.TOTAL_REMOVED }}</text>
            <line x1="28" y1="160" x2="452" y2="160" stroke="#21262d"/>
            <text x="28" y="185" font-family="monospace" font-size="11" fill="#8b949e" letter-spacing="1">NET LOC</text>
            <text x="452" y="185" font-family="monospace" font-size="20" font-weight="700" fill="#58a6ff" text-anchor="end">+${{ env.NET }}</text>
          </svg>
          EOF

      - name: Commit SVG
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add stats.svg
          git diff --staged --quiet || git commit -m "chore: update loc stats"
          git push
